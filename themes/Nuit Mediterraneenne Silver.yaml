# ═══════════════════════════════════════════════════
#  Nuit Méditerranéenne Silver — Thème Home Assistant
#  Fichier à placer dans : config/themes/nuit_mediterraneenne_silver
# ═══════════════════════════════════════════════════

Nuit Mediterraneenne Silver:

  # ── Fonds — argenté nacré ──────────────────────
  primary-background-color: "#BED0DA"
  secondary-background-color: "#CCDAE2"
  card-background-color: "#D8E6EE"
  lovelace-background: "#BED0DA"
  background-color: "#BED0DA"

  # ── Textes — bleu nuit profond ─────────────────
  primary-text-color: "#0D1B2A"
  secondary-text-color: "#2A3F52"
  disabled-text-color: "#6A8099"
  text-primary-color: "#0D1B2A"

  # ── Couleurs principales — bleu nuit accent ─────
  primary-color: "#1A2A3A"
  accent-color: "#1A2A3A"
  dark-primary-color: "#0D1B2A"
  light-primary-color: "#2A4A62"

  # ── Couleur clé OFF — gris argenté doux ────────
  disabled-color: "#8AAABB"

  # ── Barres de navigation & en-têtes ────────────
  app-header-background-color: "#0D1B2A"
  app-header-text-color: "#D8E6EE"
  app-header-icon-color: "#D8E6EE"
  header-height: 56px

  # ── Sidebar ────────────────────────────────────
  sidebar-background-color: "#0D1B2A"
  sidebar-text-color: "#8AAABB"
  sidebar-selected-text-color: "#D8E6EE"
  sidebar-selected-background-color: "rgba(216,230,238,0.12)"
  sidebar-icon-color: "#8AAABB"
  sidebar-selected-icon-color: "#D8E6EE"

  # ── Cartes — argent clair avec légère profondeur
  ha-card-background: "#D8E6EE"
  ha-card-border-color: "rgba(13,27,42,0.12)"
  ha-card-border-width: "1px"
  ha-card-border-radius: "18px"
  ha-card-box-shadow: "0px 2px 8px rgba(13,27,42,0.2)"

  # ── Séparateurs ────────────────────────────────
  divider-color: "rgba(13,27,42,0.1)"

  # ── États système ──────────────────────────────
  error-color: "#C0392B"
  warning-color: "#D68910"
  success-color: "#1E8449"
  info-color: "#1A2A3A"

  # ── Icônes OFF = gris argenté / ON = bleu nuit ─
  state-icon-color: var(--disabled-color)
  state-icon-active-color: var(--primary-color)
  state-icon-unavailable-color: "#A0B8C4"

  # Fix HA 2023.01.25+
  state-cover-open-color: var(--primary-color)
  state-cover-opening-color: var(--primary-color)
  state-cover-closing-color: var(--primary-color)
  state-light-color: var(--primary-color)
  state-light-on-color: var(--primary-color)
  state-remote-on-color: var(--primary-color)
  state-switch-on-color: var(--primary-color)

  # ── Paper item icons ───────────────────────────
  paper-item-icon-color: var(--disabled-color)
  paper-item-icon-active-color: var(--primary-color)

  # ── Toggle buttons ─────────────────────────────
  paper-toggle-button-checked-button-color: var(--primary-color)
  paper-toggle-button-checked-bar-color: var(--light-primary-color)
  paper-toggle-button-unchecked-button-color: var(--disabled-color)
  paper-toggle-button-unchecked-bar-color: "#A0B8C4"

  # ── Switchs ────────────────────────────────────
  switch-checked-color: var(--primary-color)
  switch-checked-track-color: "rgba(26,42,58,0.3)"
  switch-unchecked-color: "#A0B8C4"
  switch-unchecked-button-color: var(--disabled-color)
  switch-unchecked-track-color: "#A0B8C4"

  # ── Sliders ────────────────────────────────────
  slider-color: var(--primary-color)
  paper-slider-knob-color: var(--primary-color)
  paper-slider-knob-start-color: var(--primary-color)
  paper-slider-pin-color: var(--primary-color)
  paper-slider-active-color: var(--primary-color)
  paper-slider-container-color: "#A0B8C4"

  # ── Inputs ─────────────────────────────────────
  input-fill-color: "#CCDAE2"
  input-ink-color: var(--primary-text-color)
  input-label-ink-color: var(--secondary-text-color)
  input-disabled-fill-color: "#BED0DA"
  input-disabled-ink-color: var(--disabled-text-color)
  input-disabled-label-ink-color: var(--disabled-text-color)
  input-idle-line-color: "#A0B8C4"
  input-dropdown-icon-color: var(--primary-text-color)
  input-hover-line-color: var(--primary-color)
  mdc-text-field-fill-color: "#CCDAE2"
  mdc-text-field-ink-color: var(--primary-text-color)
  mdc-text-field-label-ink-color: var(--secondary-text-color)

  # ── Tables ─────────────────────────────────────
  table-row-background-color: "#CCDAE2"
  table-row-alternative-background-color: "#D8E6EE"

  # ── Labels / badges ────────────────────────────
  label-badge-background-color: var(--primary-color)
  label-badge-text-color: "#D8E6EE"
  label-badge-red: "#C0392B"
  label-badge-blue: var(--primary-color)

  # ── Mode clair forcé ───────────────────────────
  modes:
    light:
      primary-background-color: "#BED0DA"
      card-background-color: "#D8E6EE"
