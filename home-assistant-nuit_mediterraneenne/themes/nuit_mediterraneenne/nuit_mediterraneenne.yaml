# ═══════════════════════════════════════════════════
#  Nuit Méditerranéenne — Thème Home Assistant
#  Fichier à placer dans : config/themes/nuit_mediterraneenne
# ═══════════════════════════════════════════════════

Nuit Méditerranéenne:

  # ── Fonds ──────────────────────────────────────
  primary-background-color: "#0D1B2A"
  secondary-background-color: "#1A2A3A"
  card-background-color: "#1A2A3A"
  lovelace-background: "#0D1B2A"
  background-color: "#0D1B2A"

  # ── Textes ─────────────────────────────────────
  primary-text-color: "#F0F4F8"
  secondary-text-color: "#94A3B8"
  disabled-text-color: "#475569"
  text-primary-color: "#F0F4F8"

  # ── Couleurs principales ────────────────────────
  primary-color: "#38BDF8"
  accent-color: "#38BDF8"
  dark-primary-color: "#0EA5E9"
  light-primary-color: "#7DD3FC"

  # ── Couleur clé OFF (utilisée comme base icônes)
  disabled-color: "#E8EDF2"

  # ── Barres de navigation & en-têtes ────────────
  app-header-background-color: "#0D1B2A"
  app-header-text-color: "#F0F4F8"
  app-header-icon-color: "#E8EDF2"
  header-height: 56px

  # ── Sidebar ────────────────────────────────────
  sidebar-background-color: "#0D1B2A"
  sidebar-text-color: "#94A3B8"
  sidebar-selected-text-color: "#38BDF8"
  sidebar-selected-background-color: "rgba(56,189,248,0.1)"
  sidebar-icon-color: "#94A3B8"
  sidebar-selected-icon-color: "#38BDF8"

  # ── Cartes ─────────────────────────────────────
  ha-card-background: "#1A2A3A"
  ha-card-border-color: "rgba(56,189,248,0.08)"
  ha-card-border-width: "1px"
  ha-card-border-radius: "18px"
  ha-card-box-shadow: "0px 0px 3px 0px #060f18"

  # ── Séparateurs ────────────────────────────────
  divider-color: "rgba(56,189,248,0.1)"

  # ── États système ──────────────────────────────
  error-color: "#F87171"
  warning-color: "#FBBF24"
  success-color: "#34D399"
  info-color: "#38BDF8"

  # ── Icônes OFF / ON ───────
  state-icon-color: var(--disabled-color)
  state-icon-active-color: var(--primary-color)
  state-icon-unavailable-color: var(--primary-background-color)

  # Fix pour HA 2023.01.25 et supérieur
  state-cover-open-color: var(--primary-color)
  state-cover-opening-color: var(--primary-color)
  state-cover-closing-color: var(--primary-color)
  state-light-color: var(--primary-color)
  state-light-on-color: var(--primary-color)
  state-remote-on-color: var(--primary-color)
  state-switch-on-color: var(--primary-color)

  # ── Paper item icons (listes entities) ─────────
  paper-item-icon-color: var(--disabled-color)
  paper-item-icon-active-color: var(--primary-color)

  # ── Toggle buttons ─────────────────────────────
  paper-toggle-button-checked-button-color: var(--primary-color)
  paper-toggle-button-checked-bar-color: var(--light-primary-color)
  paper-toggle-button-unchecked-button-color: var(--disabled-color)
  paper-toggle-button-unchecked-bar-color: var(--primary-background-color)

  # ── Switchs ────────────────────────────────────
  switch-checked-color: var(--primary-color)
  switch-checked-track-color: "rgba(56,189,248,0.3)"
  switch-unchecked-color: var(--primary-background-color)
  switch-unchecked-button-color: var(--disabled-color)
  switch-unchecked-track-color: var(--primary-background-color)

  # ── Sliders ────────────────────────────────────
  slider-color: var(--primary-color)
  paper-slider-knob-color: var(--primary-color)
  paper-slider-knob-start-color: var(--primary-color)
  paper-slider-pin-color: var(--primary-color)
  paper-slider-active-color: var(--primary-color)
  paper-slider-container-color: var(--disabled-color)

  # ── Inputs ─────────────────────────────────────
  input-fill-color: var(--primary-background-color)
  input-ink-color: var(--primary-text-color)
  input-label-ink-color: var(--primary-text-color)
  input-disabled-fill-color: var(--primary-background-color)
  input-disabled-ink-color: var(--disabled-text-color)
  input-disabled-label-ink-color: var(--disabled-text-color)
  input-idle-line-color: var(--primary-background-color)
  input-dropdown-icon-color: var(--primary-text-color)
  input-hover-line-color: var(--primary-color)
  mdc-text-field-fill-color: var(--primary-background-color)
  mdc-text-field-ink-color: var(--primary-text-color)
  mdc-text-field-label-ink-color: var(--primary-text-color)

  # ── Tables ─────────────────────────────────────
  table-row-background-color: var(--primary-background-color)
  table-row-alternative-background-color: var(--secondary-background-color)

  # ── Labels / badges ────────────────────────────
  label-badge-background-color: var(--accent-color)
  label-badge-text-color: var(--primary-text-color)
  label-badge-red: "#F87171"
  label-badge-blue: var(--primary-color)

  # ── Mode sombre forcé ──────────────────────────
  modes:
    dark:
      primary-background-color: "#0D1B2A"
      card-background-color: "#1A2A3A"